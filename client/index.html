<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Oplytics.digital — Operational Excellence Platform</title>
    <meta name="description" content="Oplytics.digital is the operational excellence platform for manufacturing. OEE tracking, SQDCP boards, policy deployment, action management, and more." />
    <meta name="theme-color" content="#0A0E1A" />

    <!-- Open Graph defaults (overridden per page by SEOHead component) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oplytics.digital" />
    <meta property="og:title" content="Oplytics.digital — Operational Excellence Platform" />
    <meta property="og:description" content="Purpose-built digital tools for manufacturing operational excellence. OEE, SQDCP, Policy Deployment, and more." />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Oplytics.digital",
      "url": "https://oplytics.digital",
      "description": "Operational excellence platform for manufacturing. Purpose-built digital tools for OEE tracking, SQDCP boards, policy deployment, and more.",
      "sameAs": [
        "https://linkedin.com/company/oplytics",
        "https://twitter.com/oplytics"
      ]
    }
    </script>

    <!-- Structured Data: WebSite (for sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Oplytics.digital",
      "url": "https://oplytics.digital"
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
